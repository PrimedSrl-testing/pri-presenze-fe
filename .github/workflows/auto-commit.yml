name: Auto Commit Changes

on:
  push:
    branches:
      - main
      - dev
      - "**"

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "claude-auto-bot"
          git config user.email "bot@users.noreply.github.com"

      - name: Commit changes
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "auto: commit changes from Claude"

      - name: Push changes
        run: |
          git push